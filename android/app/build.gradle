apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "org.jetbrains.kotlin.kapt"
//apply plugin: "com.facebook.react"

// Добавляем плагин сервисов Google Play
// Он используется исключительно для отправки результатов бенчмарков (с согласия пользователя) в Hugging Face Spaces через Firebase.
// Firebase используется для функциональности App Check, позволяя неавторизованным пользователям безопасно отправлять свои данные бенчмарков.


apply from: "../../node_modules/react-native-config/android/dotenv.gradle"

/**
 * Этот блок конфигурации предназначен для кастомизации вашего React Native Android приложения.
 * По умолчанию вам не нужно применять никакой конфигурации, просто раскомментируйте нужные строки.
 */
react {
    /* Папки */
    //   Корень вашего проекта, где находится "package.json". По умолчанию: '../..'
    // root = file("../../")
    //   Папка, где находится NPM-пакет react-native. По умолчанию: ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   Папка, где находится пакет Codegen для react-native. По умолчанию: ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   Файл cli.js, который является точкой входа для React Native CLI. По умолчанию: ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Варианты (flavors) */
    //   Список вариантов, которые доступны для отладки. Для них мы пропустим этапы сборки JS-бандла и ресурсов.
    //   По умолчанию это просто 'debug'.
    //   Если вы добавляете варианты (flavors), такие как lite, prod и т.д., вам нужно будет перечислить ваши отлаживаемые варианты.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Сборка бандла */
    //   Список, содержащий команду node и её флаги. По умолчанию: ['node'].
    // nodeExecutableAndArgs = ["node"]
    //
    //   Команда для запуска сборки бандла. По умолчанию: 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   Путь к файлу конфигурации CLI. По умолчанию пусто.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   Имя генерируемого файла ресурсов, содержащего ваш JS-бандл.
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   Входной файл для генерации бандла. По умолчанию: 'index.android.js' или 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   Список дополнительных флагов для передачи командам 'bundle'.
    //   См. https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Команды для Hermes */
    //   Команда компилятора hermes для запуска. По умолчанию: 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   Список флагов для передачи компилятору Hermes. По умолчанию: ["-O", "-output-source-map"]
    // hermesFlags = ["-O", "-output-source-map"]

    /* Автоподключение библиотек */
    autolinkLibrariesWithApp()
}

/**
 * Установите значение true, чтобы запустить Proguard для релизных сборок для минификации Java байт-кода.
 */
def enableProguardInReleaseBuilds = false

/**
 * Предпочтительная сборка JavaScriptCore (JSC)
 *
 * Например, для использования интернационального варианта вы можете использовать:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * Интернациональный вариант включает библиотеку ICU i18n и необходимые данные,
 * позволяя использовать, например, `Date.toLocaleString` и `String.localeCompare`,
 * которые дают корректные результаты при использовании локальных настроек, отличных от en-US.
 * Обратите внимание, что этот вариант примерно на 6 МиБ больше на архитектуру, чем стандартный.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.faust.ai"                           // Изменено: новое пространство имен
    defaultConfig {
        applicationId "com.faust.ai"                   // Изменено: новый ID приложения
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1                                  // Изменено: начальный код версии
        versionName "1.0.0"                            // Изменено: начальное имя версии
        ndk {
            abiFilters "arm64-v8a"                     // Изменено: только arm64-v8a
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Чтение учетных данных подписи из файла .env или переменных окружения
            def releaseStorePassword = project.env.get("APP_RELEASE_STORE_PASSWORD") ?: System.getenv("APP_RELEASE_STORE_PASSWORD")
            def releaseKeyPassword = project.env.get("APP_RELEASE_KEY_PASSWORD") ?: System.getenv("APP_RELEASE_KEY_PASSWORD")

            if (releaseStorePassword && releaseKeyPassword) {
                storeFile file("faustai-release-key.keystore")      // Изменено: новое имя файла ключа
                storePassword releaseStorePassword
                keyAlias "faustai_key_alias"                        // Изменено: новый алиас ключа
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Осторожно! В продакшене вам нужно сгенерировать свой собственный файл keystore.
            // см. https://reactnative.dev/docs/signed-apk-android.
            // Используйте конфигурацию подписи релиза только если доступны учетные данные, иначе используйте debug
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            } else {
                // Откат к debug подписи для CI-сборок без учетных данных
                signingConfig signingConfigs.debug
                println "Внимание: Учетные данные для подписи релиза не найдены, используется debug keystore"
            }
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // Версия react-native устанавливается плагином React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Android BoM (Bill of Materials) для Firebase позволяет управлять всеми версиями библиотек Firebase,
    // указывая только одну версию — версию BoM.
    //implementation platform('com.google.firebase:firebase-bom:34.4.0')
    //implementation 'com.google.firebase:firebase-appcheck-playintegrity'
    //implementation 'com.google.firebase:firebase-appcheck-debug'

    // Зависимости Room для DownloadModule
    def room_version = "2.8.2"
    implementation("androidx.room:room-runtime:$room_version")
    // Расширения Kotlin и поддержка корутин для Room
    implementation("androidx.room:room-ktx:$room_version")
    kapt("androidx.room:room-compiler:$room_version")
    // WorkManager для DownloadModule
    implementation "androidx.work:work-runtime-ktx:2.10.5"
    // Lifecycle для DownloadModule
    implementation "androidx.lifecycle:lifecycle-livedata-ktx:2.9.4"
    // Coroutines для DownloadModule (ожидание)
    implementation "androidx.concurrent:concurrent-futures-ktx:1.3.0"

    // Основная библиотека для AndroidX Jetpack - Нужна для WindowCompat (используем для edge-to-edge)
    implementation "androidx.core:core-ktx:1.17.0"

    // OkHttp для DownloadModule (сетевые запросы)
    implementation("com.squareup.okhttp3:okhttp:4.12.0")
}

project.ext.vectoricons = [
    iconFontNames: [ 'MaterialIcons.ttf', 'MaterialCommunityIcons.ttf' ] // Указываем файлы шрифтов
]

apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")