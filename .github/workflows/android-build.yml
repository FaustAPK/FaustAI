name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Clean old java files
        run: |
          rm -rf android/app/src/main/java/com/pocketpalai
          rm -rf android/app/src/main/java/com/pocketpal
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Clean Gradle cache
        run: |
          cd android
          ./gradlew clean
          rm -rf .gradle
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FaustAI-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk